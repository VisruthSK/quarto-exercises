on:
  push:
    branches: main
  workflow_dispatch:

name: pages.yaml

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Prepare site source
        run: |
          mkdir site-src
          cp README.md site-src/index.md
          cp example.qmd site-src/example.qmd
          cp reference.qmd site-src/reference.qmd
          cp _quarto.yml site-src/_quarto.yml
          cp -R _extensions site-src/_extensions

      - name: Render site
        working-directory: site-src
        run: quarto render

      - name: Prepare Pages metadata
        run: |
          touch site-src/_site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: site-src/_site
          clean: true
