on:
  push:
    branches: main
  workflow_dispatch:

name: pages.yaml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Prepare site source
        run: |
          mkdir site-src
          cp README.md site-src/index.md
          cp example.qmd site-src/example.qmd
          cp _quarto.yml site-src/_quarto.yml
          cp -R _extensions site-src/_extensions

      - name: Render site
        working-directory: site-src
        run: quarto render

      - name: Prepare Pages metadata
        run: |
          touch site-src/_site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-src/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
